id: REQ-gdpr-rights-01
source: { norm: GDPR, ref: "artt. 15-22 — diritti dell'interessato (accesso, cancellazione, opposizione...)" }
statement: >
  L'interessato deve poter esercitare i propri diritti sui dati trattati.
  Applicabilità parziale: il servizio non crea account, non tratta il file
  originale (mai inviato al server) e l'analytics è senza identificatori
  persistenti — la maggior parte dei diritti classici (accesso al proprio
  profilo, portabilità di dati account) non si applica per assenza stessa
  del dato, non per una scelta di non conformità.
applicability: partial
satisfied_by: [CTL-hash-client-side, CTL-matomo-cookieless]
visibility: public
