id: REQ-gdpr-rights-01
source: { norm: GDPR, ref: "artt. 15-22 — diritti dell'interessato (accesso, cancellazione, opposizione...)" }
statement: >
  L'interessato deve poter esercitare i propri diritti sui dati trattati.
  Applicabilità parziale: per chi attesta un'opera, il servizio non crea
  account, non tratta il file originale (mai inviato al server) e
  l'analytics è senza identificatori persistenti — la maggior parte dei
  diritti classici (accesso al proprio profilo, portabilità di dati
  account) non si applica per assenza stessa del dato, non per una scelta
  di non conformità. Dalla P22 (2026-07-10) esiste una seconda categoria di
  interessati con dati reali da gestire: gli sviluppatori che richiedono
  una chiave API self-service (email + provider OAuth). Per loro il diritto
  di cancellazione è self-service-adiacente (richiesta al gestore →
  anonimizzazione immediata dal pannello admin) e comunque automatico dopo
  180 giorni dalla revoca della chiave. Dalla P23 (2026-07-11) esiste una
  terza categoria: chi usa il bot Telegram (id utente + contatori d'uso).
  Anche qui la cancellazione è su richiesta al gestore e comunque
  automatica dopo 90 giorni. Dalla P27 (2026-07-17/18) esiste una quarta
  categoria: chi sottoscrive l'abbonamento Professionale (email, provider,
  riferimenti abbonamento Stripe, log delle attestazioni, profilazione
  facoltativa). L'interessato può gestire in autonomia dalla pagina
  `/profilo` la profilazione facoltativa (salvataggio/rimozione, nessuna
  richiesta al gestore necessaria) e chiedere la cancellazione anticipata
  dei dati dell'abbonamento — con un trade-off esplicito e dichiarato:
  perde l'accesso al proprio archivio consultabile (i certificati restano
  comunque validi e recuperabili per impronta, come per chiunque), e può
  chiedere anche l'eliminazione dei PDF archiviati non condivisi con altre
  attestazioni.
applicability: partial
satisfied_by: [CTL-hash-client-side, CTL-matomo-cookieless, CTL-dev-selfservice, CTL-telegram-channel, CTL-pro-subscription]
