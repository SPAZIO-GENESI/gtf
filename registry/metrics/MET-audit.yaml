id: MET-audit
title: Audit
formula: >
  Media di due componenti, calcolati offline da generators/score.mjs: (1)
  freschezza dell'ultima revisione trimestrale (PRC-review-trimestrale) —
  100 se entro la cadenza dichiarata, poi decadimento lineare fino a 0 a
  due cadenze di ritardo; (2) quota di azioni correttive (ACT) chiuse
  entro scadenza sul totale delle risolte (chiuse + scadute) — con zero
  ACT ancora risolte il componente è assente, non 100. Attivata dal
  2026-07-19 (primo ciclo di revisione concluso, vedi
  gtf/docs/verbali/2026-07-review-trimestrale.md).
unit: "0-100 oppure n/d"
visibility: public
