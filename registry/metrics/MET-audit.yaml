id: MET-audit
title: Audit
formula: >
  Giorni trascorsi dall'ultima revisione interna rispetto alla cadenza
  dichiarata (GTF-ARCH §9.3), più la quota di azioni correttive (ACT)
  chiuse entro la scadenza. Non ancora calcolabile: nessun ciclo di
  revisione trimestrale si è ancora concluso da quando il framework esiste
  (dal 2026-07-09). Si attiverà al primo ciclo completato.
unit: "0-100 oppure n/d"
visibility: public
