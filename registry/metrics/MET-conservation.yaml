id: MET-conservation
title: Conservazione
formula: >
  Freschezza degli snapshot di evidenza raccolti nel tempo, più l'esito
  dell'ultimo restore-drill (binario, che decade dopo 210 giorni senza una
  nuova prova). Non ancora calcolabile: nessun collettore di snapshot e
  nessun restore-drill sono ancora stati eseguiti. Si attiverà quando
  entrambi esisteranno (vedi PRC-restore-drill).
unit: "0-100 oppure n/d"
visibility: public
