id: MET-conservation
title: Conservazione
formula: >
  Media di due componenti, calcolati offline da generators/score.mjs: (1)
  freschezza degli snapshot di evidenza — quota delle ultime 8 settimane
  ISO con una cartella snapshots/ presente; (2) esito dell'ultimo
  restore-drill (PRC-restore-drill) — 100 se riuscito entro 210 giorni, 0
  se fallito o decaduto oltre i 210 giorni, componente assente se il drill
  non è mai stato eseguito. Attivata dal 2026-07-19 (primo restore-drill
  riuscito, vedi ADR-GTF-013 e gtf/docs/verbali/2026-07-restore-drill.md).
unit: "0-100 oppure n/d"
visibility: public
