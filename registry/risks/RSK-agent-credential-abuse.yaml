id: RSK-agent-credential-abuse
title: Abuso di una credenziale agente valida (partner o sessione compromessa)
description: >
  Un'API key di un partner convenzionato, o un session token ottenuto via
  device flow, potrebbe essere usata oltre l'intento previsto (condivisione
  non autorizzata, script automatizzato aggressivo entro quota) oppure
  sottratta (secret esposto per errore, es. incollato in una chat o in un
  log). Il bypass concesso dalla credenziale riguarda SOLO la challenge
  Turnstile su /api/hash: HMAC, timestamp server e rate limit per-IP restano
  attivi in ogni caso, quindi l'impatto massimo è l'emissione di certificati
  VERI entro la quota della credenziale — mai la falsificazione di
  un'attestazione.
likelihood: low
impact: low
mitigated_by: [CTL-agent-access, CTL-hmac-signing, CTL-rate-limiting]
visibility: public
