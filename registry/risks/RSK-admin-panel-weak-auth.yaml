id: RSK-admin-panel-weak-auth
title: "Pannello admin credenziali agente: da unico secret condiviso a doppio strato con Cloudflare Access"
description: >
  Fino al 2026-07-10, /admin/* (gestione delle credenziali agente:
  emissione, revoca, quota) era raggiungibile da chiunque conoscesse il solo
  secret condiviso (confrontato a tempo costante, non un login individuale)
  — scelta esplicita dichiarata "stopgap" in ADR-P21-admin. Il gestore ha da
  allora configurato una policy Cloudflare Access (Zero Trust) davanti a
  /admin/*: le richieste non autenticate ricevono un redirect al login
  Cloudflare prima ancora di raggiungere il Worker (vedi
  ADR-P21-admin-cfaccess), quindi il secret applicativo non è più l'unica
  barriera. Chi ottiene comunque il secret può emettere/revocare credenziali
  agente entro lo stesso perimetro dello script CLI equivalente, ma NON può
  falsificare o emettere certificati (governati solo da HMAC_SECRET, non
  toccato da questo pannello).
likelihood: low
impact: low
mitigated_by: [CTL-agent-admin-panel, CTL-cloudflare-access-admin, CTL-rate-limiting]
visibility: public
