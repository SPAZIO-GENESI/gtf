id: RSK-admin-panel-weak-auth
title: "Pannello admin credenziali agente: accesso protetto in profondità"
description: >
  Il pannello di gestione delle credenziali agente (emissione, revoca,
  quota) è una funzione riservata al gestore del servizio. L'accesso è
  protetto in profondità: una policy Cloudflare Access (Zero Trust) verifica
  l'identità a monte, prima ancora che la richiesta raggiunga il Worker, con
  una protezione applicativa come secondo strato e rate limiting (vedi
  ADR-P21-admin-cfaccess). Anche nell'ipotesi che questo perimetro venga
  superato, l'ambito d'azione resta la sola gestione delle credenziali
  agente — lo stesso dell'utilità CLI equivalente — e NON tocca in alcun
  modo l'emissione o la firma dei certificati, governata unicamente da
  HMAC_SECRET, che questo pannello non conosce né usa.
likelihood: low
impact: low
mitigated_by: [CTL-agent-admin-panel, CTL-cloudflare-access-admin, CTL-rate-limiting]
visibility: public
