id: RSK-secret-compromise
title: Compromissione o perdita di HMAC_SECRET / SIGN_SECRET
description: >
  La perdita del segreto renderebbe impossibile emettere nuove
  attestazioni valide; una rotazione errata o non annunciata invaliderebbe
  la verifica di tutti i certificati già emessi (HMAC_SECRET non supporta
  doppia chiave).
likelihood: low
impact: high
mitigated_by: [CTL-secrets-escrow, CTL-hmac-canary]
visibility: public
