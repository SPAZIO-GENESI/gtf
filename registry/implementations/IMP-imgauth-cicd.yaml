id: IMP-imgauth-cicd
title: Staging replicato + CI + gate di produzione per imgauth (P24 FASE 0-4)
repo: imgauth
ref: "wrangler.toml — blocco [env.staging] (worker imgauth-staging, D1/R2/secret propri, cron disattivato, solo workers.dev); .github/workflows/ci.yml — job check (sintassi, contratto OpenAPI, dry-run) su ogni PR/push, job deploy-staging (deploy + smoke, solo push su main), job deploy-production (environment: production, required reviewer — wrangler versions upload + versions deploy dopo approvazione, smoke di sola lettura); scripts/smoke-staging.mjs (ping, status, giro hash->cert-pdf->cert)"
