integrity: >
  Raccolta settimanale (collect-evidence.mjs, P32/C2): ricalcola in locale
  lo SHA-256 del bundle mensile più recente in snapshots/anchors/ (nessun
  segreto coinvolto, il file è già committato) e verifica che
  GET /api/badge?hash=<hash> risponda verde ("✓ opera attestata") — non
  falsificabile, il badge è verde solo se quell'impronta è realmente in
  archivio. Non riverifica la prova OpenTimestamps in sé (resta
  verificabile a mano su opentimestamps.org). Primo ancoraggio: periodo
  2026-07, bundle snapshots/anchors/2026-07-bundle.json, hash
  cd57b5d3a96947a2264cbb237b3c8eb26cb130e2703838e0597d7b3189e5629b, pagina
  https://attestazione.spaziogenesi.org/c/cd57b5d3a96947a2264cbb237b3c8eb26cb130e2703838e0597d7b3189e5629b,
  prova .ots emessa (pending, matura in poche ore con la conferma Bitcoin).
