id: ADR-GTF-012
title: "MET-privacy: attivata con scanner dedicato su schema SQL + prefissi R2 di imgauth (v1)"
date: 2026-07-19
status: accepted
context: >
  MET-privacy era n/d: nessuno scanner del codice rilevava i flussi di dati
  personali non ancora registrati come DAT, quindi non era verificabile che
  i 4 DAT esistenti coprissero tutto ciĂ² che il codice tratta davvero.
  Inventario manuale (P32/B0, letto da privacy.html Â§3.1-3.8 e dagli schemi
  pubblici di imgauth) ha individuato 8 flussi non ancora documentati come
  DAT: email self-service sviluppatori, log convenzioni per dominio email,
  candidature alla vetrina integrazioni, abbonamento Professionale, due
  profilazioni facoltative (Professionale e Sviluppatore), utenti del bot
  Telegram (repo attest-bot) e â€” scoperto solo durante la progettazione
  dello scanner, non nell'inventario iniziale â€” l'email del beneficiario di
  un codice sconto riservato (pro_discounts.restricted_email, esistente da
  P27 ma mai citata in privacy.html Â§3.8).
decision: >
  Scritti 8 nuovi record DAT (i 7 attesi piĂ¹ DAT-pro-discount-email). Nuovo
  generatore `scan-privacy.mjs`, eseguito nel giro settimanale del
  collettore: scarica `worker.js` e `schema/*.sql` di imgauth (repo
  pubblico) via raw.githubusercontent.com all'ultimo tag di release (non
  `main`, per uno scan riferito a una versione precisa e riproducibile),
  rileva (a) tabelle SQL con almeno una colonna dal nome sensibile
  (`email|owner|member|name|user|phone|address|customer`, alto recall
  deliberato) e (b) scritture R2 sotto prefissi noti (`pdf/`, `ots/`,
  `meta/cert/`, `integrations/`, piĂ¹ i prefissi non personali `status/` e i
  contatori `meta/*-count`). Il terzo rilevatore previsto in fase di
  progettazione (host esterni nelle fetch di worker.js) Ă¨ stato valutato e
  scartato per il v1: i ~15 host individuati a mano (Google/Microsoft/
  LinkedIn OAuth, calendar OpenTimestamps, Turnstile, Telegram per le sole
  notifiche all'amministratore) sono tutti provider terzi giĂ  documentati
  in privacy.html Â§5 "Destinatari" o giĂ  coperti da un DAT esistente
  (Turnstile) â€” avrebbe prodotto solo falsi positivi da dichiarare, senza
  aumentare il recall reale sui flussi B0. Il mapping flussoâ†’DAT vive in
  `generators/lib/privacy-map.json`: ogni flusso rilevato Ă¨ marcato
  "coperto" (uno o piĂ¹ DAT), "falso positivo dichiarato" (con motivo â€” es.
  `conventions.name` Ă¨ il nome dell'ente, non di una persona;
  `health_log.check_name` Ă¨ il nome di un controllo di salute) o "non
  coperto". Formula: `privacyRatio = mappati / (rilevati âˆ’ falsi positivi
  dichiarati)`. Snapshot assente o fetch fallito â†’ indicatore `null`, mai
  un valore inventato.
consequences: >
  MET-privacy passa da n/d a un valore reale (atteso 100/100 con la
  copertura raggiunta: 8 DAT esistenti + gli 8 nuovi coprono tutti i
  flussi rilevati dallo scanner v1, nessuno lasciato "non coperto"). Score
  complessivo: 8/10 indicatori disponibili. Limite dichiarato nella nota
  pubblica dell'indicatore: lo scanner v1 copre solo il repo imgauth â€” i
  flussi che vivono in repo client (attest-bot, il bot Telegram) restano
  fuori, con DAT-telegram-bot-users scritto ugualmente nel registro ma non
  verificato automaticamente; possibile estensione v2. Il rilevamento host
  esterni resta una possibilitĂ  futura se emergerĂ  un'integrazione esterna
  che condivide dati personali non ancora documentata.
affects: [MET-privacy]
visibility: public
