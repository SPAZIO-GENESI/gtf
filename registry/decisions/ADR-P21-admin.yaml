id: ADR-P21-admin
title: "P21 follow-up — Pannello admin credenziali agente"
date: 2026-07-10
status: accepted
context: >
  Dopo il rollout di P21 (ADR-P21), la sola via per emettere/revocare/monitorare
  le credenziali agente era uno script CLI locale (`scripts/issue-agent-key.mjs`)
  più query SQL a mano su D1 — sufficiente per una manciata di partner, non per
  gestirne decine. Serviva un'interfaccia più comoda, ma senza esporre un
  endpoint self-service pubblico né rimandare la sicurezza a "poi".
decision: >
  Pannello HTML servito dal Worker con lo stesso identico perimetro dello
  script CLI: crea/elenca/revoca/modifica quota di `agent_credentials`, mai
  l'emissione di certificati (che resta governata solo da `HMAC_SECRET`).
  Accesso riservato al gestore con una protezione applicativa, prevista fin
  da subito come primo strato da rafforzare con **Cloudflare Access** (Zero
  Trust), configurabile dalla dashboard Cloudflare. Nessuna nuova route
  Cloudflare: il pannello è coperto dalla route esistente del dominio del
  Worker.
consequences: >
  Guadagno operativo immediato (gestione via browser invece di SQL a mano)
  con il perimetro d'azione confinato alla gestione delle credenziali
  agente, senza mai toccare la firma dei certificati. Il rafforzamento
  dell'accesso con Cloudflare Access è tracciato come azione aperta in
  RSK-admin-panel-weak-auth, poi completato (vedi ADR-P21-admin-cfaccess) —
  non silenziosamente accettato a tempo indeterminato.
affects: [CTL-agent-admin-panel]
evidence: [EVD-git-imgauth]
visibility: public
