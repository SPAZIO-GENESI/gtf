id: ADR-P25-site-voucher
title: "P25 (C) — \"Attesta con la tua email\" dal sito: voucher stateless invece di una sessione"
date: 2026-07-12
status: accepted
context: >
  Le convenzioni (P25 B, ADR-P25-conventions) funzionano solo per chi passa
  da una chiave API o da un client MCP — la sera dell'11/7 il gestore ha
  riconosciuto che il pubblico reale delle convenzioni (studenti di
  accademie d'arte, professionisti non tecnici) "non sa che farsene di una
  API key": deve poter attestare direttamente dal sito, come fa già chiunque
  in forma anonima. Serviva un modo per riconoscere l'email istituzionale di
  chi usa il sito SENZA introdurre cookie, sessioni server o un secondo
  sistema di login che avrebbe complicato il modello di minimizzazione dati
  già in vigore (il percorso anonimo resta a zero dati personali).
decision: >
  Stesso OAuth one-shot già usato per le chiavi API (Google/Microsoft/
  LinkedIn, §3.5), ma l'esito non è una riga persistita in D1: è un
  **voucher stateless firmato** —
  `base64url(JSON{email,conv,exp}) + '.' + HMAC-SHA256(HMAC_SECRET,
  'VOUCHER:'+payload)`, TTL 8 ore — consegnato nel **fragment dell'URL**
  (`#sgv=`, per costruzione mai inviato a un server) e tenuto in
  `sessionStorage` dal browser (niente cookie, niente riga di sessione
  server-side, sparisce alla chiusura della scheda o al click su "Esci").
  Il campo `conv` nel payload è solo un HINT scritto al momento
  dell'emissione: la fonte di verità sullo stato della convenzione resta
  sempre una query fresca (`matchConvention`) a ogni singolo uso del
  voucher su `/api/hash` — così una convenzione disattivata dopo
  l'emissione del voucher smette di dare vantaggi senza bisogno di alcun
  meccanismo di revoca (il voucher, semplicemente, scade da solo e non è
  mai "attivo" oltre quanto la convenzione lo sia davvero). La contabilità
  pool/tetto individuale riusa lo stesso meccanismo delle chiavi API
  (funzione condivisa `accountConventionUsage`, rifattorizzata da questo
  lavoro), quindi il comportamento — mai un blocco, solo degrado a fascia
  Base con motivo esplicito — è identico su entrambi i canali.
consequences: >
  Nessun nuovo tipo di credenziale bearer, nessuna modifica al percorso
  anonimo del sito, nessuna riga D1 per il solo fatto di accedere (a
  differenza delle chiavi API, che restano in agent_credentials anche se
  inutilizzate). Testato in locale (wrangler dev, D1 reale): voucher
  valido con/senza convenzione, tetto individuale, pool esaurito,
  convenzione disattivata dopo l'emissione del voucher (correttamente
  senza vantaggio), voucher scaduto/manomesso (403), CORS preflight con
  l'header X-SG-Voucher; frontend testato in browser (Playwright,
  --disable-web-security) — banner d'identità, pulizia del fragment
  dall'URL, uscita, stato di default. Rilasciato lo stesso giorno (imgauth
  1.21.2, tag v1.21.2; authweb 1.17.0, tag v1.17.0).
  **Incidente di concorrenza, risolto in pochi minuti**: questo codice è
  arrivato in produzione tramite il commit di una sessione Claude Code
  concorrente sullo stesso checkout locale — non un rilascio deliberato
  attraverso il gate P24 — *prima* che la migrazione schema/voucher.sql
  (colonna dev_oauth_state.purpose) fosse applicata alla D1 remota. Poiché
  handleDevOAuthStart la referenzia su OGNI chiamata (non solo
  purpose=attest), l'intero /developer/keys (P22, in uso da utenti reali)
  è rimasto irraggiungibile (500) fino all'applicazione della migrazione.
  Nessuna perdita di dati; la stessa classe di rischio (schema mancante su
  D1 remota rompe un endpoint condiviso) era già stata notata e gestita
  correttamente in ADR-P25-conventions applicando lo schema PRIMA della
  promozione — qui è mancata proprio perché il rilascio non è passato dal
  gate P24. Non genera una nuova voce di rischio dedicata: rientra nella
  categoria già coperta da RSK-unobserved-production-deploy (P24).
affects: [CTL-site-voucher-auth, CTL-convention-accounting, RSK-agent-credential-abuse]
evidence: [EVD-git-imgauth, EVD-git-imgauthweb, EVD-site-voucher-local-test]
visibility: public
