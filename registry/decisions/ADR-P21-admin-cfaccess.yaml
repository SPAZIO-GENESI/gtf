id: ADR-P21-admin-cfaccess
title: "Cloudflare Access (Zero Trust) davanti al pannello admin"
date: 2026-07-10
status: accepted
context: >
  ADR-P21-admin aveva previsto la protezione applicativa del pannello admin
  come primo strato, con piano di rafforzarla con Cloudflare Access (Zero
  Trust) appena configurabile da dashboard.
decision: >
  Il gestore ha configurato una policy Cloudflare Zero Trust Access davanti
  al percorso del pannello admin. La protezione applicativa resta attiva
  come secondo strato (se mantenerla o rimuoverla è una decisione aperta,
  non urgente).
consequences: >
  Il rischio tracciato in RSK-admin-panel-weak-auth passa a un accesso a
  doppio strato, con identità verificata a monte prima di raggiungere il
  Worker — impatto residuo abbassato da medium a low. La configurazione di
  Access vive nella dashboard Cloudflare (Zero Trust), fuori dalla portata
  di un deploy automatico.
affects: [CTL-agent-admin-panel, CTL-cloudflare-access-admin]
evidence: [EVD-cloudflare-access-admin]
visibility: public
