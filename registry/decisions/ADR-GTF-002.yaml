id: ADR-GTF-002
title: URL pubblico del Trust Center
date: 2026-07-09
status: accepted
context: >
  Il Trust Center (GTF-ARCH §7) deve avere un URL pubblico stabile. Due
  opzioni: instradarlo sotto il dominio già usato dal servizio
  (attestazione.spaziogenesi.org/trust/) via route Cloudflare + Worker
  proxy leggero — stesso pattern già rodato per /c/*; oppure un sottodominio
  dedicato (trust.spaziogenesi.org) con CNAME diretto su GitHub Pages, senza
  passare dal Worker.
decision: >
  Sottodominio dedicato trust.spaziogenesi.org (CNAME diretto su GitHub
  Pages, nessun coinvolgimento del Worker imgauth). Motivo del cambio
  rispetto alla propensione iniziale dell'architettura (che favoriva la
  route sotto lo stesso dominio): il principio di indipendenza dei tre
  repository (CLAUDE.md) vale anche per gtf, che deve potersi pubblicare da
  solo senza mai richiedere modifiche a imgauth. Il ragionamento "un solo
  dominio" ha senso per /c/<hash> (fa parte del percorso di verifica di
  un'opera, serve continuità di esperienza) ma non per il Trust Center, che
  è una pagina istituzionale/di trasparenza, non parte di quel flusso.
consequences: >
  DNS: record CNAME "trust" → spazio-genesi.github.io. Impostazione del
  custom domain nelle GitHub Pages settings del repo gtf rimandata alla fase
  M3 (Trust Center + Score), quando site/ avrà davvero un contenuto da
  servire. Nessuna modifica necessaria a imgauth/wrangler.toml.
visibility: public
