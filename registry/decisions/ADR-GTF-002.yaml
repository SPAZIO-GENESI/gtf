id: ADR-GTF-002
title: URL pubblico del Trust Center
date: 2026-07-09
status: proposed
context: >
  Il Trust Center (GTF-ARCH §7) deve avere un URL pubblico stabile. Due
  opzioni: instradarlo sotto il dominio già usato dal servizio
  (attestazione.spaziogenesi.org/trust/) via route Cloudflare + Worker
  proxy leggero — stesso pattern già rodato per /c/*; oppure un sottodominio
  dedicato (trust.spaziogenesi.org) con CNAME diretto su GitHub Pages, senza
  passare dal Worker.
decision: >
  Non ancora deciso. Propensione dell'architettura verso la prima opzione
  (route Worker sotto lo stesso dominio), per coerenza con l'esperienza
  utente a un solo dominio e perché il pattern è già rodato su /c/*. Va
  confermata dal gestore prima della fase M3 (Trust Center + Score), che
  dipende da questa scelta.
consequences: >
  Se si sceglie il sottodominio, si risparmia un hop Worker ma si introduce
  un secondo dominio user-facing; se si sceglie la route, serve toccare
  wrangler.toml del Worker imgauth (coordinamento cross-repo, non solo gtf).
visibility: public
