id: ADR-P41
title: "P41 — Versione inglese del servizio: la lingua è resa, mai un fatto attestato"
date: 2026-07-24
status: accepted
context: >
  Il servizio è nato interamente in italiano, ma i suoi canali programmabili
  (pacchetto npm, MCP Registry, GitHub Action, repository pubblici) sono per
  natura internazionali: chi arriva da lì incontrava documentazione, pagine
  pubbliche e certificati in una lingua che spesso non legge. Rendere il
  servizio bilingue tocca però superfici molto diverse per rischio — pagine
  statiche, pagine generate dal Worker, messaggi d'errore dell'API e, la più
  delicata, il contenuto del certificato PDF, cioè l'artefatto probatorio.
decision: >
  Scopo **MVP** deliberato: il sito resta italiano, con un percorso inglese
  **completo** per chi arriva dal canale programmabile — sei pagine (home,
  fasce e condizioni, pagina sviluppatori e le sue due sottopagine chiave API
  e CLI, informativa privacy) duplicate sotto `/en/`, più le due pagine HTML
  servite dal Worker (`/c/<sha256>`, `/agent/authorize`) e i messaggi d'errore
  di `/api/hash` e `/api/cert-pdf` via campo facoltativo `lang` (fallback
  `Accept-Language`). Restano fuori le pagine che riguardano chi è già dentro
  (profilo, stato, sicurezza, vetrina, changelog) e lo storico: si estendono
  una pagina per volta, sulla stessa infrastruttura.

  **L'invariante che regge tutto il piano: `lang` non entra mai in
  `hmacMessage`.** Il messaggio firmato resta l'attestazione più gli eventuali
  metadati dichiarati in forma canonica, identico a prima di P41. La lingua è
  una scelta di **resa**, non un fatto sull'opera: legarla alla firma
  invaliderebbe in un colpo solo la verifica di tutti i certificati già
  emessi, senza aggiungere alcuna garanzia. Verificato in modo diretto, non
  assunto: la stessa coppia attestazione+HMAC produce il certificato in
  entrambe le lingue, `/api/verify` (che non ha né deve avere un parametro
  `lang`) risponde `hmac_valido: true` in entrambi i casi, e un certificato
  pre-P41 resta verificabile senza eccezioni.

  Due scelte di trasparenza, non di comodità. **(1)** L'informativa privacy
  inglese è dichiarata in testa alla pagina come **traduzione di cortesia**,
  con la versione italiana che fa fede: chi arriva dal canale inglese incontra
  il flusso OAuth self-service, e servirgli l'informativa solo in italiano era
  una debolezza reale rispetto all'art. 12 GDPR — ma tradurre un testo con
  effetti giuridici senza revisione legale non lo rende ufficiale, e dirlo è
  più onesto che lasciarlo intendere. **(2)** Nessun rilevamento automatico
  della lingua e nessun reindirizzamento: solo un selettore visibile. La
  lingua la sceglie chi legge.

  Contro il rischio di divergenza fra le due versioni — la lezione delle
  pagine parallele che il progetto ha già pagato una volta — una guardia di
  CI obbligatoria: un registro delle coppie con l'impronta SHA-256 del file
  italiano al momento della traduzione, e un workflow che fallisce se
  l'italiano cambia senza che l'inglese sia stato aggiornato. Nessuno step di
  build: le pagine EN sono file statici, come le italiane.

  Corollari di perimetro accettati per l'MVP: le etichette AcroForm del
  template PDF restano italiane anche nel certificato inglese (sono grafica
  del template: tradurle significherebbe un secondo template da mantenere e
  riverificare nelle coordinate), quindi il certificato EN è misto; il QR e
  l'URL di verifica stampati nel PDF restano invariati per lingua e puntano
  alla stessa pagina canonica, che si apre nella lingua chiesta da chi la
  visita, non da chi ha emesso.
consequences: >
  Il contratto API cambia in modo **puramente additivo**: senza il campo
  `lang` ogni risposta, ogni pagina e ogni PDF restano bit-identici a prima —
  criterio di accettazione verificato, non dichiarato. Nessun endpoint nuovo,
  nessun dato nuovo, nessun trattamento nuovo: l'informativa è stata
  **tradotta**, non estesa, e nessuna nuova categoria di interessati compare.
  Per questo P41 non introduce alcun rischio né alcun controllo nuovo nel
  registro: la lingua non cambia il modello di minaccia, e l'unica superficie
  sensibile — il messaggio firmato — è esplicitamente fuori dal suo raggio.

  Rilasciato in due tempi per una ragione strutturale, non per una svista: il
  sito statico non ha un gate di produzione separato (pubblica al push), il
  Worker sì (approvazione umana). Le pagine inglesi sono quindi andate live
  prima del motore bilingue; nessuna dipendenza fra le due parti, verificato
  prima di procedere. Il deploy del Worker (imgauth 1.33.0) è passato dalla
  pipeline con gate approvato dal gestore, come ogni rilascio di produzione.

  Il criterio per decidere se estendere lo scopo — altre pagine, altre lingue
  — è misurabile e già fissato: il traffico reale sulle pagine `/en/` nelle
  settimane successive. Se non si materializza, l'estensione non si fa.
visibility: public
