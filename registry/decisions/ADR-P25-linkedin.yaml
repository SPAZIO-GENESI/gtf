id: ADR-P25-linkedin
title: "P25 — LinkedIn come quarto provider OAuth self-service"
date: 2026-07-11
status: accepted
context: >
  Il primo design P25 (2026-07-11) aveva valutato e rinviato LinkedIn come
  provider OAuth per `/developer/keys`: pubblico marginale per una pagina
  di API key, perché LinkedIn è percepito come identità professionale, non
  da developer, a differenza di GitHub (primario) e GitLab (opzionale). La
  valutazione è stata rovesciata alla definizione delle fasce di utilizzo
  pubblicate su `/condizioni/` (Base / Sviluppatore / Professionale "in
  arrivo" / Convenzione): quella stessa caratteristica è un vantaggio — la
  futura fascia Professionale (fotografi, artisti, professionisti che si
  presentano con un profilo pubblico, non un account Google generico) non
  aveva ancora un'identità OAuth adatta, e LinkedIn è l'unico provider del
  lotto P25 che comunica esplicitamente "professionista".
decision: >
  Aggiunto LinkedIn a `DEV_PROVIDERS` in `worker.js` (imgauth 1.20.0) con lo
  stesso pattern OIDC generico già usato per Google/Microsoft (nessun caso
  speciale come il previsto per GitHub): authorization code flow one-shot,
  `userinfo` letto una sola volta, token scartato subito dopo (stesso
  invariante di ADR-P22). Unica differenza tecnica dagli altri due provider:
  scope **`openid profile email`** invece di `openid email` — il prodotto
  "Sign In with LinkedIn using OpenID Connect" concede i tre scope in blocco
  e un sottoinsieme rischia `invalid_scope`; il campo `scope` è stato reso
  configurabile per provider (`handleDevOAuthStart` ora legge `cfg.scope`)
  invece di restare hardcoded uguale per tutti. Il controllo
  `email_verified === false` (prima solo su Google) è esteso a LinkedIn.
  Nessun aggancio automatico oggi tra provider LinkedIn e fascia
  Professionale: è solo un quarto bottone su `/developer/keys`, alla pari di
  Google/Microsoft — l'attribuzione "email LinkedIn ⇒ fascia Professionale"
  resta da disegnare quando quella fascia esce dal perimetro P26.
consequences: >
  **In produzione dal 2026-07-12** (imgauth 1.20.0, tag `v1.20.0`): FASE 0
  completata (app registrata su LinkedIn Developer Portal, prodotto "Sign In
  with LinkedIn using OpenID Connect" provisionato, redirect URI registrate),
  login reale verificato in locale, poi rilascio via pipeline P24 (push →
  check+deploy-staging automatici → gate `production` approvato dal gestore
  → `wrangler versions upload`+`deploy`). `CTL-dev-selfservice` esteso a
  menzionare LinkedIn nello stesso giro del deploy: il controllo descrive
  solo ciò che è verificabile in produzione. Superficie di abuso invariata rispetto a
  Google/Microsoft (stessa quota 50/mese, stesso indice UNIQUE parziale,
  stessa notifica Telegram) — nessun nuovo rischio, copertura di
  `RSK-dev-selfservice-signup-abuse` invariata.
affects: [CTL-dev-selfservice]
evidence: [EVD-git-imgauth]
visibility: public
