id: ADR-P25-linkedin
title: "P25 â€” LinkedIn come quarto provider OAuth self-service, ripensato dopo il rinvio del mattino"
date: 2026-07-11
status: accepted
context: >
  Il design P25 (mattina del 2026-07-11) aveva valutato e rinviato LinkedIn
  come provider OAuth per `/developer/keys`, motivando la scelta con un
  "pubblico marginale per una pagina API key": LinkedIn Ă¨ percepito come
  identitĂ  professionale/social, non da developer, a differenza di GitHub
  (primario) e GitLab (opzionale). La stessa sera, nella conversazione sulle
  fasce di utilizzo pubblicate su `/condizioni/` (Base / Sviluppatore /
  Professionale "in arrivo" / Convenzione â€” vedi ADR-P25 quando registrato),
  il gestore ha riletto quella stessa caratteristica come un vantaggio: la
  fascia Professionale (fotografi, artisti, professionisti che si presentano
  con un profilo pubblico, non un account Google generico) non ha ancora
  un'identitĂ  OAuth dedicata. LinkedIn Ă¨ l'unico provider del lotto P25 che
  comunica esplicitamente "professionista".
decision: >
  Aggiunto LinkedIn a `DEV_PROVIDERS` in `worker.js` (imgauth 1.20.0) con lo
  stesso pattern OIDC generico giĂ  usato per Google/Microsoft (nessun caso
  speciale come il previsto per GitHub): authorization code flow one-shot,
  `userinfo` letto una sola volta, token scartato subito dopo (stesso
  invariante di ADR-P22). Unica differenza tecnica dagli altri due provider:
  scope **`openid profile email`** invece di `openid email` â€” il prodotto
  "Sign In with LinkedIn using OpenID Connect" concede i tre scope in blocco
  e un sottoinsieme rischia `invalid_scope`; il campo `scope` Ă¨ stato reso
  configurabile per provider (`handleDevOAuthStart` ora legge `cfg.scope`)
  invece di restare hardcoded uguale per tutti. Il controllo
  `email_verified === false` (prima solo su Google) Ă¨ esteso a LinkedIn.
  Nessun aggancio automatico oggi tra provider LinkedIn e fascia
  Professionale: Ă¨ solo un quarto bottone su `/developer/keys`, alla pari di
  Google/Microsoft â€” l'attribuzione "email LinkedIn â‡’ fascia Professionale"
  resta da disegnare quando quella fascia esce dal perimetro P26.
consequences: >
  **In produzione dal 2026-07-12** (imgauth 1.20.0, tag `v1.20.0`): FASE 0
  completata (app registrata su LinkedIn Developer Portal, prodotto "Sign In
  with LinkedIn using OpenID Connect" provisionato, redirect URI registrate),
  login reale verificato in locale, poi rilascio via pipeline P24 (push â†’
  check+deploy-staging automatici â†’ gate `production` approvato dal gestore
  â†’ `wrangler versions upload`+`deploy`). `CTL-dev-selfservice` esteso a
  menzionare LinkedIn nello stesso giro del deploy â€” stesso principio di
  onestĂ  del registro giĂ  applicato in ADR-GTF-008 e a `CTL-cicd-pipeline`
  (P24): il controllo ora descrive solo ciĂ˛ che Ă¨ verificabile in
  produzione, non prima. Superficie di abuso invariata rispetto a
  Google/Microsoft (stessa quota 50/mese, stesso indice UNIQUE parziale,
  stessa notifica Telegram) â€” nessun nuovo rischio, copertura di
  `RSK-dev-selfservice-signup-abuse` invariata.
