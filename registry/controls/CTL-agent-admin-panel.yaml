id: CTL-agent-admin-panel
title: "Pannello admin credenziali agente: elenco/emissione/revoca/quota dietro secret condiviso"
status: active
visibility: public
satisfies: [REQ-27001-inspiration-01]
mitigates: [RSK-admin-panel-weak-auth]
implemented_by: [IMP-imgauth-admin-panel]
evidenced_by: [EVD-git-imgauth]
verify_howto: >
  GET /admin restituisce la pagina (nessun dato, nessun auth richiesto per
  vederla). GET/POST/PATCH su /admin/api/keys senza header X-Admin-Secret o
  con un valore errato → 403 in ogni caso; con il secret corretto → elenco,
  emissione, revoca e modifica quota funzionano e sono verificabili
  interrogando poi /api/hash con la chiave emessa/revocata (deve
  rispettivamente funzionare o dare 403). Nota: questo controllo è
  esplicitamente uno stopgap — vedi ADR-P21-admin e
  RSK-admin-panel-weak-auth per il piano di superamento con Cloudflare Access.
owner: it@spaziogenesi.org
review_every_days: 90
last_reviewed: 2026-07-10
