id: CTL-hmac-signing
title: "Token HMAC che vincola hash, timestamp server-side e metadati dichiarati"
status: active
visibility: public
implemented_by: [IMP-imgauth-hmac, IMP-imgauth-cert-pdf-verify, IMP-imgauth-runchecks-hmac-probe, IMP-imgauth-api-verify]
