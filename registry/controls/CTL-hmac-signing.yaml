verify_howto: >
  Prova a chiamare /api/cert-pdf con un hash o timestamp diverso da quello
  restituito da /api/hash: la richiesta viene rifiutata (400/403). Lo stato
  del componente "worker" su /api/status riflette anche l'esito della sonda
  HMAC interna.
