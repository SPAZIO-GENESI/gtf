  può ricalcolare l'hash del bundle nel repo gtf, confrontarlo con quello
  stampato sul certificato, e verificare la prova .ots indipendentemente
  su opentimestamps.org. Primo ancoraggio: periodo 2026-07 (bundle
  snapshots/anchors/2026-07-bundle.json, hash
  cd57b5d3a96947a2264cbb237b3c8eb26cb130e2703838e0597d7b3189e5629b).
