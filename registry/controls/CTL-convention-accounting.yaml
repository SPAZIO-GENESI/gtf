id: CTL-convention-accounting
title: "Convenzioni per dominio email: pool mensile dell'ente, degrado mai blocco, log minimizzato alle sole emissioni tassate"
status: active
visibility: public
satisfies: [REQ-27001-inspiration-01, REQ-gdpr-min-01, REQ-gdpr-info-01, REQ-gdpr-rights-01]
mitigates: [RSK-agent-credential-abuse, RSK-convention-data-linkage]
implemented_by: [IMP-imgauth-conventions]
evidenced_by: [EVD-convention-live-test, EVD-git-imgauth]
verify_howto: >
  Apri il pannello /admin (sezione Convenzioni), crea una convenzione di
  test (dominio, pool mensile, tetto individuale, date). Con un'email
  verificata OAuth su quel dominio, GET /developer/keys → chiave emessa con
  quota = tetto individuale ed expires_at = fine convenzione. Attestazioni
  da quella chiave rispondono con fascia:'convenzione' finché pool e tetto
  non sono esauriti; superata una delle due soglie, fascia degrada a 'base'
  con fascia_motivo esplicito (mai un errore/blocco) e nessuna riga
  aggiuntiva compare in convention_attestations. Il report per membro
  (/admin/api/conventions/<id>/report) è visibile solo nel pannello del
  gestore — verso l'ente va condiviso in forma aggregata. Verificato in
  produzione il 2026-07-12 con la prima convenzione reale (dominio
  spaziogenesi.org): login OAuth reale, chiave taggata correttamente,
  attestazione con fascia:'convenzione', riga di log corretta.
  Dal 2026-07-12 la STESSA contabilità (accountConventionUsage) serve anche
  il canale voucher dal sito (via='site', nessuna chiave coinvolta) — vedi
  CTL-site-voucher-auth per il meccanismo di autenticazione via voucher, non
  ancora verificato con un login reale in produzione a differenza di questo
  controllo.
owner: it@spaziogenesi.org
review_every_days: 180
last_reviewed: 2026-07-12
