id: DAT-pro-discount-email
title: Email del beneficiario di un codice sconto riservato (abbonamento Professionale)
data_categories: ["email del beneficiario (facoltativa, inserita dall'admin al momento della creazione del codice)"]
legal_basis: "misure precontrattuali richieste dall'interessato (art. 6.1.b) e legittimo interesse alla gestione di condizioni commerciali dedicate (art. 6.1.f)"
retention: "per la durata di validità del codice sconto (valid_from/valid_to); nessuna anonimizzazione automatica dichiarata — cancellazione anticipata su richiesta come per gli altri trattamenti dell'abbonamento Professionale"
flow: "creazione manuale del codice dal pannello /admin (scheda Professionale) → pro_discounts.restricted_email (D1 imgauth-health, NULL se il codice è per tutti) — nessun'azione dell'utente finale genera questo dato; emerso dallo scanner Privacy (P32/B1), campo esistente da P27 (imgauth 1.22.0+); dichiarato in privacy.html §3.8 (paragrafo 'Codici sconto riservati', aggiunto il 2026-07-19 a chiusura del debito documentale annotato in P32)"
visibility: public
